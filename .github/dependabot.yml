# Dependabot Configuration
# Automatically creates PRs for dependency updates
# See https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - Dannysoy2800
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps):"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    reviewers:
      - Dannysoy2800
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps):"
